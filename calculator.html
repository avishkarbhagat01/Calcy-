<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #121214;
        }

        .calculator {
            background-color: #1a1a1e;
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 320px;
        }

        .display {
            width: 100%;
            height: 80px;
            background-color: transparent;
            border: none;
            color: #ffffff;
            text-align: right;
            font-size: 2.5rem;
            margin-bottom: 20px;
            padding: 0 10px;
            outline: none;
            overflow-x: auto;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: #2d2d34;
            color: #ffffff;
        }

        button:active {
            transform: scale(0.95);
        }

        /* Operator buttons (+, -, *, =, etc) */
        button.operator {
            background-color: #ff9f0a;
            color: #ffffff;
        }

        button.operator:hover {
            background-color: #e08b07;
        }

        /* Top row function buttons (C, Backspace) */
        button.function {
            background-color: #a5a5a5;
            color: #000000;
        }

        button.function:hover {
            background-color: #8e8e8e;
        }

        /* Number buttons hover */
        button:not(.operator):not(.function):hover {
            background-color: #3e3e46;
        }

        /* Double width button for zero */
        button.zero {
            grid-column: span 2;
            border-radius: 30px;
            text-align: left;
            padding-left: 25px;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" class="display" id="display" readonly value="0">
        <div class="buttons">
            <button class="function" onclick="clearDisplay()">C</button>
            <button class="function" onclick="deleteLast()">⌫</button>
            <button class="operator" onclick="appendOperator('%')">%</button>
            <button class="operator" onclick="appendOperator('/')">÷</button>

            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('*')">×</button>

            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('-')">−</button>

            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="appendOperator('+')">+</button>

            <button class="zero" onclick="appendNumber('0')">0</button>
            <button onclick="appendNumber('.')">.</button>
            <button class="operator" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        let resetDisplay = false;

        function appendNumber(num) {
            if (display.value === '0' || resetDisplay) {
                display.value = num;
                resetDisplay = false;
            } else {
                display.value += num;
            }
        }

        function appendOperator(op) {
            if (resetDisplay) resetDisplay = false;
            
            // Prevent adding multiple operators consecutively
            const lastChar = display.value.slice(-1);
            if (['+', '-', '*', '/', '%'].includes(lastChar)) {
                display.value = display.value.slice(0, -1) + op;
            } else {
                display.value += op;
            }
        }

        function clearDisplay() {
            display.value = '0';
        }

        function deleteLast() {
            if (display.value.length > 1) {
                display.value = display.value.slice(0, -1);
            } else {
                display.value = '0';
            }
        }

        function calculate() {
            try {
                // Using Function instead of eval for a slightly safer execution layer
                let result = new Function('return ' + display.value)();
                
                // Handle decimals nicely (e.g., 0.1 + 0.2)
                if (result % 1 !== 0) {
                    result = parseFloat(result.toFixed(8));
                }
                
                display.value = result;
                resetDisplay = true;
            } catch (error) {
                display.value = 'Error';
                resetDisplay = true;
            }
        }
    </script>
</body>
</html>
